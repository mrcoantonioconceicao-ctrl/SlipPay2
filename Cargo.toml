[package]
name = "slippay-rust"
version = "0.1.0"
edition = "2021"

[dependencies]

# Web server
actix-web = "4.5"

# Async runtime
tokio = { version = "1.37", features = ["full"] }

# JSON / Serialize
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Database (SQLite)
sqlx = { version = "0.7.4", features = ["sqlite", "runtime-tokio", "macros"] }

# HTTP client (Stellar Horizon)
reqwest = { version = "0.11", features = ["json", "rustls-tls"] }

# UUID (IDs dos pedidos)
uuid = { version = "1.8", features = ["v4"] }

# Segurança (HMAC SHA256)
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"

# Utils (opcional mas útil)

