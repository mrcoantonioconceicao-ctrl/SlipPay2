[package]
name = "slippay-rust"
version = "0.1.0"
edition = "2021"

[dependencies]

# 🌐 Web server
actix-web = "4"

# ⚡ Async runtime
tokio = { version = "1", features = ["full"] }

# 📦 JSON / Serialize
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# 🆔 UUID
uuid = { version = "1", features = ["v4"] }

# 💾 SQLite
rusqlite = { version = "0.31", features = ["bundled"] }

# 🌍 HTTP client
reqwest = { version = "0.12", features = ["json"] }

# 🔐 HMAC SHA256
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"
base64 = "0.22"
