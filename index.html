<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SlipPay Test</title>
</head>
<body>

<h2>Pagamento com Stellar</h2>

<button onclick="criarPedido()">Gerar Pagamento</button>

<div id="resultado"></div>

<script>
async function criarPedido() {
  const payload = JSON.stringify({ valor_brl: 100 });

  // gerar assinatura igual backend
  const encoder = new TextEncoder();
  const key = await crypto.subtle.importKey(
    "raw",
    encoder.encode("super-secret-key"),
    { name: "HMAC", hash: "SHA-256" },
    false,
    ["sign"]
  );

  const signature = await crypto.subtle.sign(
    "HMAC",
    key,
    encoder.encode(payload)
  );

  const hex = Array.from(new Uint8Array(signature))
    .map(b => b.toString(16).padStart(2, '0'))
    .join('');

  const res = await fetch("http://127.0.0.1:8081/orders", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-signature": hex
    },
    body: payload
  });

  const data = await res.json();

  document.getElementById("resultado").innerHTML = `
    <p><b>Valor:</b> ${data.valor_xlm} XLM</p>
    <p><b>Status:</b> ${data.status}</p>

    <a href="${data.payment_uri}">
      👉 Pagar com Stellar
    </a>

    <p><b>Memo:</b> ${data.memo}</p>
  `;
}
</script>

</body>
</html>
