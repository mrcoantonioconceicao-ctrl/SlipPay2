<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>SlipPay</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body>

<div class="container">

    <h1>🚀 SlipPay</h1>

    <p class="subtitle">
        Gateway Stellar Testnet
    </p>

    <div class="card">

        <label>
            Valor em BRL
        </label>

        <input
            type="number"
            id="valor"
            placeholder="100"
        />

        <button onclick="criarPedido()">
            Criar Cobrança
        </button>

    </div>

    <div id="resultado" class="hidden">

        <div class="card">

            <h2>Pagamento</h2>

            <p>
                <strong>Valor:</strong>

                <span id="valor_xlm"></span> XLM
            </p>

            <div class="status-box">

                <span id="status" class="pending">
                    Aguardando pagamento...
                </span>

            </div>

            <p class="memo-title">
                Memo Hash
            </p>

            <textarea
                id="memo"
                readonly
            ></textarea>

            <div id="qrcode"></div>

            <a
                id="stellar_link"
                target="_blank"
            >
                Abrir Wallet Stellar
            </a>

        </div>

    </div>

    <div class="footer">
        SlipPay MVP • Stellar Testnet
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
